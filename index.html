    <script>
        // Registar e forçar actualização do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Producao/sw.js')
                .then(reg => {
                    console.log('[SW] Registado:', reg.scope);
                    // Verificar se há update disponível
                    reg.update();
                    reg.addEventListener('updatefound', () => {
                        const newSW = reg.installing;
                        newSW.addEventListener('statechange', () => {
                            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[SW] Nova versão disponível — a recarregar...');
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(err => console.log('[SW] Erro:', err));
            // Forçar reload quando SW toma controlo
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('[SW] Novo SW ativo — a recarregar...');
                window.location.reload();
            });
        }

            let m = (hf * 60 + mf) - (hi * 60 + mi);
            if (m < 0) m += 1440;
            return Math.floor(m / 60) + 'h ' + (m % 60) + 'min';

            });

            const [perturbacoes, setPerturbacoes] = useState(() => {
                const s = localStorage.getItem('perturbacoesProd');
                return s ? JSON.parse(s) : [];
            });

            const [registo, setRegisto] = useState({
                data: dataAtual, tipo: '', artigo: '', operacao: '', unidade: '',
                horaInicio: '', horaFim: '', comentarios: ''
            });

            const [pert, setPert] = useState({
                data: dataAtual, tipo: '', horaInicio: '', horaFim: ''
            });

            // Estados para configurações dinâmicas (carregadas do Excel)
            const [programasLista, setProgramasLista] = useState(TIPOS);
            const [artigosLista, setArtigosLista] = useState(ARTIGOS);
            const [operacoesLista, setOperacoesLista] = useState(OPERACOES);
            const [perturbsLista, setPerturbsLista] = useState(PERTURBACOES);
            const [colaboradoresLista, setColaboradoresLista] = useState(COLABORADORES);
            const [configLoaded, setConfigLoaded] = useState(false);
            const [configError, setConfigError] = useState('');

            // Carregar configurações do Excel via Power Automate
            useEffect(() => {
                const carregarConfigs = async () => {
                    // Verificar cache local (válido por 1 hora)
                    const cache = localStorage.getItem('configCache');
                    const cacheTime = localStorage.getItem('configCacheTime');
                    if (cache && cacheTime && (Date.now() - parseInt(cacheTime)) < 3600000) {
                        try {
                            const dados = JSON.parse(cache);
                            aplicarConfigs(dados);
                            setConfigLoaded(true);
                            console.log('✅ Configs carregadas do cache');
                            return;
                        } catch(e) {}
                    }

                    // Buscar do Power Automate
                    if (!CONFIG.URL_CONFIG || CONFIG.URL_CONFIG.includes('xxx')) {
                        console.log('⚠️ URL_CONFIG não configurado, usando dados locais');
                        setConfigLoaded(true);
                        return;
                    }

                    try {
                        const resp = await fetch(CONFIG.URL_CONFIG, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ acao: 'lerConfigs' })
                        });
                        
                        if (resp.ok) {
                            const dados = await resp.json();
                            aplicarConfigs(dados);
                            // Guardar em cache
                            localStorage.setItem('configCache', JSON.stringify(dados));
                            localStorage.setItem('configCacheTime', Date.now().toString());
                            console.log('✅ Configs carregadas do Excel');
                        }
                    } catch(e) {
                        console.log('⚠️ Erro ao carregar configs, usando dados locais:', e.message);
                        setConfigError('Offline - usando dados locais');
                    }
                    setConfigLoaded(true);
                };

                const aplicarConfigs = (dados) => {
                    // Se o flow devolver um array plano, organizar por tipo de item
                    if (Array.isArray(dados)) {
                        const dadosOrganizados = {
                            programas: dados.filter(i => i.ID && i.Nome && i.Icon),
                            artigos: dados.filter(i => i.Artigo && i.Programa && !i.Operacao),
                            operacoes: dados.filter(i => i.Operacao && i.Unidade && i.Artigos),
                            perturbacoes: dados.filter(i => i.Perturbacao),
                            colaboradores: dados.filter(i => {
                                if (!i.Nome || !i.Turno || !i.Ativo) return false;
                                const ativo = (i.Ativo || '').toLowerCase() === 'sim';
                                if (ativo) return true;
                                const ds = i.DataSaida || i.dataSaida || '';
                                if (!ds) return false;
                                const hoje = new Date(); hoje.setHours(0,0,0,0);
                                const dataSaida = new Date(ds); dataSaida.setHours(0,0,0,0);
                                return hoje < dataSaida;
                            })
                        };
                        aplicarConfigs(dadosOrganizados);
                        return;
                    }

                    // ConfigProgramas
                    if (dados.programas && Array.isArray(dados.programas) && dados.programas.length > 0) {
                        const progs = dados.programas.map(p => ({
                            id: p.ID || p.id,
                            nome: p.Nome || p.nome,
                            icon: p.Icon || p.icon || '📦'
                        })).filter(p => p.id);
                        if (progs.length > 0) setProgramasLista(progs);
                    }

                    // ConfigArtigos
                    if (dados.artigos && Array.isArray(dados.artigos) && dados.artigos.length > 0) {
                        const arts = dados.artigos.map(a => ({
                            artigo: a.Artigo || a.artigo,
                            tipo: a.Programa || a.programa || a.Tipo || a.tipo
                        })).filter(a => a.artigo);
                        if (arts.length > 0) setArtigosLista(arts);
                    }

                    // ConfigOperacoes
                    if (dados.operacoes && Array.isArray(dados.operacoes) && dados.operacoes.length > 0) {
                        const ops = dados.operacoes.map(o => ({
                            op: o.Operacao || o.op,
                            unidade: o.Unidade || o.unidade || '',
                            programa: o.Programa || o.programa || '',
                            artigos: typeof (o.Artigos || o.artigos) === 'string' 
                                ? (o.Artigos || o.artigos).split(',').map(a => a.trim()).filter(a => a)
                                : (o.Artigos || o.artigos || [])
                        })).filter(o => o.op);
                        if (ops.length > 0) setOperacoesLista(ops);
                    }

                    // ConfigPerturbacoes
                    if (dados.perturbacoes && Array.isArray(dados.perturbacoes) && dados.perturbacoes.length > 0) {
                        const perts = dados.perturbacoes.map(p => p.Perturbacao || p.perturbacao || p.Descricao || p).filter(p => p && typeof p === 'string');
                        if (perts.length > 0) setPerturbsLista(perts);
                    }

                    // ConfigColaboradores — exclui inativos cuja data de saída já chegou
                    if (dados.colaboradores && Array.isArray(dados.colaboradores) && dados.colaboradores.length > 0) {
                        const hoje = new Date(); hoje.setHours(0,0,0,0);
                        // Extrair PINs dos colaboradores
                        const pinsDoConfig = {};
                        dados.colaboradores.forEach(c => {
                            const id = c.ID || c.id;
                            const pin = c.PIN || c.pin;
                            if (id && pin) pinsDoConfig[String(id)] = String(pin);
                        });
                        if (Object.keys(pinsDoConfig).length > 0) {
                            setPins(pinsDoConfig);
                            localStorage.setItem('prod_pins', JSON.stringify(pinsDoConfig));
                        }

                        // Construir lista de login com IDs e nomes curtos do Excel
                        const loginList = dados.colaboradores
                            .filter(c => {
                                const ativo = ['sim','true','verdadeiro'].includes((c.Ativo || c.ativo || '').toLowerCase());
                                if (ativo) return true;
                                const ds = c.DataSaida || c.dataSaida || '';
                                if (!ds) return false;
                                const dataSaida = new Date(ds); dataSaida.setHours(0,0,0,0);
                                return hoje < dataSaida;
                            })
                            .map(c => {
                                const id = parseInt(c.ID || c.id);
                                const nm = c.Nome || c.nome || '';
                                // Usar nome curto da lista hardcoded se existir, senão usar primeiro+último nome
                                const hardcoded = COLABORADORES_LISTA.find(x => x.id === id);
                                const sh = hardcoded ? hardcoded.sh : nm.split(' ').filter((_,i,a) => i===0||i===a.length-1).join(' ');
                                return { id, nm, sh };
                            })
                            .filter(c => c.id && c.nm);
                        if (loginList.length > 0) {
                            setColaboradoresLogin(loginList);
                            localStorage.setItem('prod_colabs_login', JSON.stringify(loginList));
                        }

                        const cols = dados.colaboradores
                            .filter(c => {
                                const ativo = ['sim','true','verdadeiro'].includes((c.Ativo || c.ativo || '').toLowerCase());
                                if (ativo) return true;
                                const ds = c.DataSaida || c.dataSaida || '';
                                if (!ds) return false;
                                const dataSaida = new Date(ds); dataSaida.setHours(0,0,0,0);
                                return hoje < dataSaida;
                            })
                            .map(c => c.Nome || c.nome)
                            .filter(c => c);
                        if (cols.length > 0) setColaboradoresLista(cols);
                    }
                };

                carregarConfigs();
            }, []);

            // Forçar recarga das configs
            const recarregarConfigs = () => {
                localStorage.removeItem('configCache');
                localStorage.removeItem('configCacheTime');
                localStorage.removeItem('prod_colabs_login');
                localStorage.removeItem('prod_pins');
                setConfigLoaded(false);
                setConfigError('');
                window.location.reload();
            };

            // Persistência
            useEffect(() => { localStorage.setItem('registosProd', JSON.stringify(registos)); }, [registos]);
            useEffect(() => { localStorage.setItem('perturbacoesProd', JSON.stringify(perturbacoes)); }, [perturbacoes]);

            // Contagem de pendentes
            const pendentesCount = useMemo(() => {
                const r = registos.filter(x => !x.synced).length;
                const p = perturbacoes.filter(x => !x.synced).length;
                return r + p;
            }, [registos, perturbacoes]);

            // Reenvio automático ao fazer login e manual
            const reenviarPendentes = async (silencioso = false) => {
                const regPend = registos.filter(x => !x.synced);
                const pertPend = perturbacoes.filter(x => !x.synced);
                if (regPend.length === 0 && pertPend.length === 0) {
                    if (!silencioso) alert('✅ Não há registos por sincronizar!');
                    return;
                }
                setSincronizando(true);
                let sucesso = 0, falha = 0;
                // Reenviar operações
                const novosRegs = [...registos];
                for (const r of regPend) {
                    const ok = await enviarPowerAutomate(CONFIG.URL_PRODUCAO, {
                        ID: r.id.toString(), Data: r.data, Artigo: r.artigo,
                        TipoCaixa: r.tipoCaixa || '', Operacao: r.operacao,
                        UnidadeProducao: r.unidade, Colaborador: r.colaborador,
                        HoraInicio: r.horaInicio, HoraFim: r.horaFim,
                        Duracao: r.duracao, Comentarios: r.comentarios || '',
                        DataHoraRegisto: r.dataHora
                    });
                    const idx = novosRegs.findIndex(x => x.id === r.id);
                    if (ok) { novosRegs[idx] = { ...novosRegs[idx], synced: true }; sucesso++; }
                    else falha++;
                }
                setRegistos(novosRegs);
                // Reenviar perturbações
                const novasPerts = [...perturbacoes];
                for (const p of pertPend) {
                    const ok = await enviarPowerAutomate(CONFIG.URL_PERTURBACOES, {
                        IDRegisto: p.id.toString(), Data: p.data, Colaborador: p.colaborador,
                        TipoPerturbacao: p.tipo, HoraInicio: p.horaInicio,
                        HoraFim: p.horaFim, Duracao: p.duracao,
                        DataHoraRegisto: p.dataHora
                    });
                    const idx = novasPerts.findIndex(x => x.id === p.id);
                    if (ok) { novasPerts[idx] = { ...novasPerts[idx], synced: true }; sucesso++; }
                    else falha++;
                }
                setPerturbacoes(novasPerts);
                setSincronizando(false);
                setUltimaSync(new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }));
                if (!silencioso) {
                    if (falha === 0) alert('✅ ' + sucesso + ' registo(s) sincronizado(s) com sucesso!');
                    else alert('⚠️ ' + sucesso + ' sincronizado(s), ' + falha + ' falharam. Tenta novamente mais tarde.');
                }
            };

            // Reenvio automático ao fazer login
            useEffect(() => {
                if (loggedIn) reenviarPendentes(true);
            }, [loggedIn]);

            // Tipos/Programas dinâmicos - usa programas do Excel, com fallback
            const tiposDinamicos = useMemo(() => {
                const tiposComArtigos = [...new Set(artigosLista.map(a => a.tipo))];
                return tiposComArtigos.map(t => {
                    const prog = programasLista.find(x => x.id === t);
                    return prog || { id: t, nome: t, icon: '📦' };
                });
            }, [artigosLista, programasLista]);

            // Filtros
            const artigosFilt = useMemo(() => 
                registo.tipo ? artigosLista.filter(a => a.tipo === registo.tipo) : []
            , [registo.tipo, artigosLista]);

            const opsFilt = useMemo(() => 
                registo.artigo ? operacoesLista.filter(o => o.artigos.includes(registo.artigo)) : []
            , [registo.artigo, operacoesLista]);

            const regsDia = useMemo(() => 
                registos.filter(r => r.data === dataAtual && r.colaborador === operador)
            , [registos, dataAtual, operador]);

            const pertsDia = useMemo(() => 
                perturbacoes.filter(p => p.data === dataAtual && p.colaborador === operador)
            , [perturbacoes, dataAtual, operador]);

            // Totais
            const totais = useMemo(() => {
                let mp = 0, mpt = 0;
                regsDia.forEach(r => mp += calcMin(r.horaInicio, r.horaFim));
                pertsDia.forEach(p => mpt += calcMin(p.horaInicio, p.horaFim));
                return { ops: regsDia.length, perts: pertsDia.length, tempoProd: mp, tempoPert: mpt, total: mp + mpt };
            }, [regsDia, pertsDia]);

            // Resumo por tipo
            const resumoPorTipo = useMemo(() => {
                const r = {};
                regsDia.forEach(reg => {
                    const art = artigosLista.find(a => a.artigo === reg.artigo);
                    const t = art?.tipo || 'Outro';
                    if (!r[t]) r[t] = { ops: 0, min: 0 };
                    r[t].ops++;
                    r[t].min += calcMin(reg.horaInicio, reg.horaFim);
                });
                return r;
            }, [regsDia, artigosLista]);

            // Login/Logout com PIN
            const pickEmp = (emp) => {
                setSelEmp(emp);
                setPinDigits(['', '', '', '']);
                setPinError(false);
                setTimeout(() => {
                    const el = document.getElementById('pin0');
                    if (el) el.focus();
                }, 100);
            };

            const handlePinInput = (i, val, allDigits) => {
                if (!/^\d?$/.test(val)) return;
                const d = [...allDigits];
                d[i] = val;
                setPinDigits(d);
                if (val && i < 3) {
                    setTimeout(() => {
                        const el = document.getElementById('pin' + (i + 1));
                        if (el) el.focus();
                    }, 10);
                }
                if (val && i === 3) {
                    const fullPin = d.join('');
                    if (fullPin.length === 4) doLoginPin(selEmp, fullPin);
                }
            };

            const handlePinKeyDown = (i, e) => {
                if (e.key === 'Backspace' && !pinDigits[i] && i > 0) {
                    const el = document.getElementById('pin' + (i - 1));
                    if (el) el.focus();
                }
            };

            const doLoginPin = (emp, pin) => {
                if (!emp || pin.length !== 4) return;
                // Bloquear se não houver PIN definido
                if (!pins[emp.id]) {
                    setPinError(true);
                    setPinDigits(['', '', '', '']);
                    return;
                }
                if (pins[emp.id] !== pin) {
                    setPinError(true);
                    setPinDigits(['', '', '', '']);
                    setTimeout(() => {
                        const el = document.getElementById('pin0');
                        if (el) el.focus();
                    }, 10);
                    return;
                }
                // Verificar registos em aberto de dias anteriores
                const hoje = new Date().toISOString().split('T')[0];
                const regsGuardados = JSON.parse(localStorage.getItem('registosProd') || '[]');
                const pertsGuardados = JSON.parse(localStorage.getItem('perturbacoesProd') || '[]');
                // Agrupar por dia, apenas dias anteriores a hoje
                const diasAnteriores = {};
                [...regsGuardados, ...pertsGuardados]
                    .filter(r => r.colaborador === emp.nm && r.data < hoje)
                    .forEach(r => {
                        if (!diasAnteriores[r.data]) diasAnteriores[r.data] = 0;
                        const [hi, mi] = (r.horaInicio||'0:0').split(':').map(Number);
                        const [hf, mf] = (r.horaFim||'0:0').split(':').map(Number);
                        let m = (hf*60+mf)-(hi*60+mi);
                        if (m < 0) m += 1440;
                        diasAnteriores[r.data] += m;
                    });
                // Verificar se há algum dia com menos de 450 min (7h30) — excluir fins de semana e dias encerrados
                const diasIncompletos = Object.entries(diasAnteriores)
                    .filter(([d, min]) => min < 450 && !eFimDeSemana(d) && localStorage.getItem('diaEncerrado_' + emp.nm + '_' + d) !== '1')
                    .sort((a, b) => b[0].localeCompare(a[0])); // mais recente primeiro
                localStorage.setItem('operadorProd', emp.nm);
                setOperador(emp.nm);
                setLoggedIn(true);
                setPinError(false);
                if (diasIncompletos.length > 0) {
                    const [dataInc, minInc] = diasIncompletos[0];
                    setAvisoRegistosAbertos({ data: dataInc, totalMin: minInc });
                }
            };

            const login = () => {
                const fullPin = pinDigits.join('');
                if (selEmp && fullPin.length === 4) doLoginPin(selEmp, fullPin);
            };

            const logout = () => {
                localStorage.removeItem('operadorProd');
                setOperador('');
                setLoggedIn(false);
                setSelEmp(null);
                setPinDigits(['', '', '', '']);
                setPinError(false);
                setView('menu');
            };

            // Adicionar registo
            const addRegisto = async () => {
                if (!registo.artigo || !registo.operacao || !registo.horaInicio || !registo.horaFim) {
                    alert('Preencha todos os campos obrigatórios!');
                    return;
                }

                if (eFeriado(registo.data) && !confirm(formatData(registo.data) + ' é feriado. Continuar?')) return;

                setLoading(true);
                const id = Date.now();
                const dur = calcDuracao(registo.horaInicio, registo.horaFim);
                const art = artigosLista.find(a => a.artigo === registo.artigo);

                const novo = {
                    id,
                    data: registo.data,
                    artigo: registo.artigo,
                    tipoCaixa: art?.tipo || '',
                    operacao: registo.operacao,
                    unidade: registo.unidade,
                    colaborador: operador,
                    horaInicio: registo.horaInicio,
                    horaFim: registo.horaFim,
                    duracao: dur,
                    comentarios: registo.comentarios,
                    dataHora: new Date().toLocaleString('pt-PT'),
                    synced: false
                };

                // Enviar para Power Automate
                const enviado = await enviarPowerAutomate(CONFIG.URL_PRODUCAO, {
                    ID: id.toString(),
                    Data: registo.data,
                    Artigo: registo.artigo,
                    TipoCaixa: art?.tipo || '',
                    Operacao: registo.operacao,
                    UnidadeProducao: registo.unidade,
                    Colaborador: operador,
                    HoraInicio: registo.horaInicio,
                    HoraFim: registo.horaFim,
                    Duracao: dur,
                    Comentarios: registo.comentarios || '',
                    DataHoraRegisto: new Date().toLocaleString('pt-PT')
                });

                novo.synced = enviado;
                setRegistos([...registos, novo]);

                setRegisto({
                    ...registo,
                    artigo: '', operacao: '', unidade: '',
                    horaInicio: registo.horaFim, horaFim: '', comentarios: ''
                });

                setLoading(false);
                setShowDiaModal(true);
            };

            // Adicionar perturbação
            const addPert = async () => {
                if (!pert.tipo || !pert.horaInicio || !pert.horaFim) {
                    alert('Preencha todos os campos!');
                    return;
                }

                setLoading(true);
                const id = Date.now();
                const dur = calcDuracao(pert.horaInicio, pert.horaFim);

                const nova = {
                    id,
                    data: pert.data,
                    tipo: pert.tipo,
                    colaborador: operador,
                    horaInicio: pert.horaInicio,
                    horaFim: pert.horaFim,
                    duracao: dur,
                    dataHora: new Date().toLocaleString('pt-PT'),
                    synced: false
                };

                const enviado = await enviarPowerAutomate(CONFIG.URL_PERTURBACOES, {
                    IDRegisto: id.toString(),
                    Data: pert.data,
                    Colaborador: operador,
                    TipoPerturbacao: pert.tipo,
                    HoraInicio: pert.horaInicio,
                    HoraFim: pert.horaFim,
                    Duracao: dur,
                    DataHoraRegisto: new Date().toLocaleString('pt-PT')
                });

                nova.synced = enviado;
                setPerturbacoes([...perturbacoes, nova]);

                setPert({ ...pert, tipo: '', horaInicio: pert.horaFim, horaFim: '' });
                setLoading(false);
                setShowDiaModal(true);
            };

            // ============================================================
            // MODAL - AVISO REGISTOS EM ABERTO
            // ============================================================
            const ModalAvisoAberto = () => {
                if (!avisoRegistosAbertos) return null;
                const { data, totalMin } = avisoRegistosAbertos;
                const [d, m, a] = data.split('-').reverse();
                const dataFmt = d + '/' + m + '/' + a;
                const h = Math.floor(totalMin / 60);
                const min = totalMin % 60;
                const hoje = new Date().toISOString().split('T')[0];
                const dataFmtHoje = hoje.split('-').reverse().join('/');
                return (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <div style={{ fontSize: '52px', marginBottom: '12px' }}>⚠️</div>
                            <h2 style={{ color: '#d97706' }}>Registos em aberto</h2>
                            <p>
                                No dia <strong>{dataFmt}</strong> ficaram registos por completar.<br/>
                                Total registado: <strong>{h}h {min}min</strong> (mín. 7h30)<br/><br/>
                                Tens de completar os registos antes de avançar.
                            </p>
                            <button className="modal-btn" style={{ background: 'linear-gradient(135deg, #d97706, #b45309)', color: 'white' }}
                                onClick={() => {
                                    setDataAtual(data);
                                    setAvisoRegistosAbertos(null);
                                }}>
                                📝 Completar registos de {dataFmt}
                            </button>
                        </div>
                    </div>
                );
            };

            // ============================================================
            // MODAL - DIA TERMINADO?
            // ============================================================
            const ModalDia = () => {
                const [fase, setFase] = useState(1);

                const encerrarDia = () => {
                    localStorage.setItem('diaEncerrado_' + operador + '_' + dataAtual, '1');
                    setShowDiaModal(false);
                    logout();
                };

                const saiMaisCedo = () => {
                    localStorage.setItem('diaEncerrado_' + operador + '_' + dataAtual, '1');
                    setShowDiaModal(false);
                    logout();
                };

                const continuarRegisto = () => {
                    setShowDiaModal(false);
                    setView('menu');
                };

                const terminarMaisTarde = () => {
                    // Não marca como encerrado — pode ser avisado amanhã
                    setShowDiaModal(false);
                    logout();
                };

                return (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            {fase === 1 ? (
                                <>
                                    <div style={{ fontSize: '52px', marginBottom: '12px' }}>🏁</div>
                                    <h2>Registo guardado!</h2>
                                    <p>O dia de trabalho está terminado?</p>
                                    <button className="modal-btn modal-btn-yes" onClick={() => setFase(2)}>
                                        ✅ Sim, o dia terminou
                                    </button>
                                    <button className="modal-btn modal-btn-no" onClick={() => setFase(3)}>
                                        ➕ Não, tenho mais para registar
                                    </button>
                                </>
                            ) : fase === 2 ? (
                                <>
                                    <div style={{ fontSize: '52px', marginBottom: '12px' }}>🤔</div>
                                    <h2>Como foi o dia?</h2>
                                    <p>Cumpriu o horário completo ou saiu mais cedo?</p>
                                    <button className="modal-btn modal-btn-yes" onClick={encerrarDia}>
                                        ✅ Dia completo
                                    </button>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Botão Operação */}
                        <button className="btn btn-primary mb-3" style={{ width: '100%', padding: '20px', fontSize: '18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }} onClick={() => setView('operacao')}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                                <span style={{ fontSize: '30px' }}>📦</span>
                                <div style={{ textAlign: 'left' }}>
                                    <div>Registar Operação</div>
                                    <div style={{ fontSize: '12px', opacity: 0.8, fontWeight: '400' }}>Artigo, operação, tempo</div>
                                </div>
                            </div>
                            <span>→</span>
                        </button>

                        {/* Botão Perturbação */}
                        <button className="btn btn-danger mb-3" style={{ width: '100%', padding: '20px', fontSize: '18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }} onClick={() => setView('perturbacao')}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                                <span style={{ fontSize: '30px' }}>⚠️</span>
                                <div style={{ textAlign: 'left' }}>
                                    <div>Registar Perturbação</div>
                                    <div style={{ fontSize: '12px', opacity: 0.8, fontWeight: '400' }}>Paragens, avarias, etc.</div>
                                </div>
                            </div>
                            <span>→</span>
                        </button>

                        {/* Botão Resumo */}
                        <button className="btn btn-secondary mb-4" style={{ width: '100%', padding: '16px' }} onClick={() => setView('resumo')}>
                            📊 Ver Resumo do Dia
                        </button>

                        {/* Alterar colaborador */}
                        <button className="btn" style={{ width: '100%', background: 'transparent', color: '#64748b' }} onClick={logout}>
                            🔄 Alterar colaborador
                        </button>

                        {/* Indicador de pendentes */}
                        {pendentesCount > 0 && (
                            <div style={{ background: '#fef3c7', border: '2px solid #f59e0b', borderRadius: '12px', padding: '14px 16px', marginBottom: '10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                    <span style={{ fontSize: '22px' }}>⚠️</span>
                                    <div>
                                        <div style={{ fontWeight: '700', color: '#92400e', fontSize: '14px' }}>
                                            {pendentesCount} registo{pendentesCount > 1 ? 's' : ''} por sincronizar
                                        </div>
                                        <div style={{ fontSize: '12px', color: '#b45309' }}>Não chegaram ao Excel</div>
                                    </div>
                                </div>
                                <button className="btn" style={{ background: '#f59e0b', color: 'white', padding: '8px 14px', fontSize: '13px', whiteSpace: 'nowrap' }}
                                    onClick={() => reenviarPendentes(false)} disabled={sincronizando}>
                                    {sincronizando ? '⏳' : '📤 Reenviar'}
                                </button>
                            </div>
                        )}

                        {ultimaSync && pendentesCount === 0 && (
                            <div style={{ textAlign: 'center', fontSize: '12px', color: '#059669', marginBottom: '10px' }}>
                                ✅ Tudo sincronizado ({ultimaSync})
                            </div>
                        )}

                        {/* Recarregar configurações */}
                        <button className="btn" style={{ width: '100%', background: 'transparent', color: '#94a3b8', fontSize: '13px', marginTop: '10px' }} onClick={recarregarConfigs}>
                            🔄 Atualizar configurações do Excel
                        </button>

                        {configError && (
                            <div style={{ textAlign: 'center', fontSize: '12px', color: '#f59e0b', marginTop: '8px' }}>
                                ⚠️ {configError}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
